openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Modula Clinic — Smart Treatment Journey API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: patients
  - name: protocols
  - name: treatments
  - name: tasks
  - name: adherence
  - name: insights
  - name: dashboard
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: alerts
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /patients:
    get:
      operationId: listPatients
      tags: [patients]
      summary: List patients with adherence summary, ordered by risk
      responses:
        "200":
          description: Patients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Patient"
    post:
      operationId: createPatient
      tags: [patients]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatientInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
  /patients/me:
    get:
      operationId: getMyPatient
      tags: [patients]
      summary: Returns the patient linked to the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Linked patient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
        '404':
          description: No patient linked to this user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiMessage'
  /patients/{id}:
    get:
      operationId: getPatient
      tags: [patients]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
    patch:
      operationId: linkPatientAccount
      tags: [patients]
      summary: Link a Replit user account to a patient record
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchPatientInput"
      responses:
        "200":
          description: Updated patient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Patient"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/adherence:
    get:
      operationId: getPatientAdherence
      tags: [adherence]
      summary: Adherence radar detail computed by the Adherence Engine
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Adherence detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdherenceDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/progress:
    get:
      operationId: getPatientProgress
      tags: [adherence]
      summary: Daily completion series for the active treatment
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Daily progress points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgressPoint"
  /patients/{id}/treatments:
    get:
      operationId: getPatientTreatments
      tags: [treatments]
      summary: All non-draft treatments for a patient (history view for professionals)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Treatment history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TreatmentHistoryItem"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/treatment:
    get:
      operationId: getActiveTreatment
      tags: [treatments]
      summary: "Active treatment with its tasks (BR-022: only active treatments)"
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Active treatment or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentDetail"
        "404":
          description: No active treatment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/tasks/today:
    get:
      operationId: getTodayTasks
      tags: [tasks]
      summary: Patient's tasks for today with completion status
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Today's tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TodayTask"
  /patients/{id}/measurements:
    get:
      operationId: getPatientMeasurements
      tags: [adherence]
      summary: Measurement (weight) log history for the past 30 days
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Measurement history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MeasurementPoint"
  /patients/{id}/numeric-logs:
    get:
      operationId: getPatientNumericLogs
      tags: [adherence]
      summary: Numeric log history for a given category (sleep, mood) for the past 30 days
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: category
          in: query
          required: true
          schema: { type: string, enum: [sleep, mood] }
      responses:
        "200":
          description: Numeric log history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MeasurementPoint"
        "400":
          description: Invalid category
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiMessage" }
  /patients/{id}/insight:
    get:
      operationId: getLatestInsight
      tags: [insights]
      summary: Latest AI insight for the patient (BR-072)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Latest insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"
        "404":
          description: No insight yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/push-token:
    post:
      operationId: registerPushToken
      tags: [patients]
      summary: Register an Expo push token for a patient's device
      security:
        - session: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushTokenInput"
      responses:
        "200":
          description: Token stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Patient not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/notify:
    post:
      operationId: notifyPatient
      tags: [patients]
      summary: Send a push reminder to a patient's device (professional only)
      security:
        - session: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Notification dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyResult"
        "404":
          description: Patient not found or no push token registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "429":
          description: Reminder already sent today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /patients/{id}/insight/generate:
    post:
      operationId: generateInsight
      tags: [insights]
      summary: Generate a fresh AI insight from the Adherence Engine output (BR-070–BR-073, BR-093)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Generated insight
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insight"
        "404":
          description: Patient not found or no active treatment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /protocols:
    get:
      operationId: listProtocols
      tags: [protocols]
      summary: Protocol library
      responses:
        "200":
          description: Protocols
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Protocol"
    post:
      operationId: createProtocol
      tags: [protocols]
      summary: Create a custom protocol with tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProtocolInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"
  /protocols/{id}:
    get:
      operationId: getProtocol
      tags: [protocols]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Protocol
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Protocol"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /treatments:
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Apply a protocol to a patient — creates treatment in Draft state (BR-021)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TreatmentInput"
      responses:
        "201":
          description: Created treatment (Draft, publish to activate)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentCreated"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /treatments/{id}/publish:
    post:
      operationId: publishTreatment
      tags: [treatments]
      summary: Publish a treatment — Draft → Active, validates at least one task (BR-003, BR-090)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Published treatment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentPublishResult"
        "400":
          description: Invalid params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Treatment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "409":
          description: Treatment is not in draft state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "422":
          description: "Treatment has no tasks (BR-003)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /treatments/{id}/complete:
    post:
      operationId: completeTreatment
      tags: [treatments]
      summary: Mark an active treatment as completed (Active → Completed, BR-021)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Treatment marked as completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentStatusResult"
        "404":
          description: Treatment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "409":
          description: "Treatment cannot be closed: not active, no activity, or mandatory tasks never logged"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentCloseBlockedError"
  /treatments/{id}/cancel:
    post:
      operationId: cancelTreatment
      tags: [treatments]
      summary: Cancel an active treatment (Active → Cancelled, BR-021)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Treatment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentStatusResult"
        "404":
          description: Treatment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "409":
          description: "Treatment cannot be cancelled: not active, no activity, or mandatory tasks never logged"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentCloseBlockedError"
  /task-logs:
    post:
      operationId: createTaskLog
      tags: [tasks]
      summary: Patient registers an activity (recomputes adherence) — BR-035 rejects duplicates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskLogInput"
      responses:
        "201":
          description: Created log with fresh adherence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskLogResult"
        "400":
          description: Invalid input or no active treatment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Patient ownership violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "409":
          description: "Duplicate log within the same period (BR-035)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the returnTo path on success or /api/login on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
            default: /
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /profile:
    get:
      operationId: getProfessionalProfile
      tags: [dashboard]
      summary: Get the current professional's profile settings
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        "200":
          description: Profile data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
    patch:
      operationId: updateProfessionalProfile
      tags: [dashboard]
      summary: Update the current professional's profile settings (e.g. notification e-mail)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfessionalProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfessionalProfile"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List all high-risk alerts (professionals only)
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Alerts, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Not a professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /alerts/check:
    post:
      operationId: checkAlerts
      tags: [alerts]
      summary: Scan all patients and create high-risk alerts (professionals only)
      security:
        - sessionCookie: []
      responses:
        "200":
          description: Alert check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertCheckResult"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Not a professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /alerts/{id}/read:
    patch:
      operationId: markAlertRead
      tags: [alerts]
      summary: Mark an alert as read (professionals only)
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Alert marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "400":
          description: Invalid params
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "403":
          description: Not a professional
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
        "404":
          description: Alert not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMessage"
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Clinic-wide adherence overview
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
  schemas:
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]
    ApiMessage:
      type: object
      properties:
        error: { type: string }
      required: [error]
    Patient:
      type: object
      required: [id, name, goal, startWeightKg, riskLevel, adherenceScore, trend, hasActiveTreatment, hasPushToken]
      properties:
        id: { type: integer }
        name: { type: string }
        goal: { type: string }
        age: { type: ["integer", "null"] }
        startWeightKg: { type: ["number", "null"] }
        currentWeightKg: { type: ["number", "null"] }
        goalWeightKg: { type: ["number", "null"] }
        nextAppointment: { type: ["string", "null"] }
        userId: { type: ["string", "null"], description: "Replit user ID linked to this patient, if any" }
        adherenceScore: { type: integer, description: "0-100 from Adherence Engine" }
        riskLevel: { type: string, enum: [high, medium, low, none] }
        trend: { type: string, enum: [improving, stable, declining, unknown] }
        hasActiveTreatment: { type: boolean }
